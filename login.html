<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="h3 mb-3">Giriş Yap</h1>
            <form id="loginForm" class="d-grid gap-3">
              <div>
                <label class="form-label" for="username">Kullanıcı Adı</label>
                <input id="username" class="form-control" type="text" required>
              </div>
              <div>
                <label class="form-label" for="password">Şifre</label>
                <input id="password" class="form-control" type="password" required>
              </div>
              <button class="btn btn-primary" type="submit">Giriş</button>
            </form>
            <div id="message" class="small text-danger mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (response.ok) {
        window.location.href = '/';
        return;
      }

      const errorData = await response.json();
      message.textContent = errorData.detail || 'Giriş başarısız';
    });
  </script>
  <script src="/static/bootstrap.min.js"></script>
</body>
</html>
